      record.injuries.push({ id, label, roll: value });
      if (label === '受伤') applyInjury(id, 'injured', `第 ${state.month} 月大考`);
      if (label === '重伤') applyInjury(id, 'severe', `第 ${state.month} 月大考`);
      if (label === '死亡／失踪') killCharacter(id, `第 ${state.month} 月大考死亡／失踪`, state.month);
      addLog(STEP_NAMES.exam, `${characterName(id)}伤势：${label}。`, `逐人使用${event.data.overwhelming ? '压倒性优势专用' : '姿态×结果'}伤势表；骰值 ${value}。`);
    }

    function finishExamPhase() {
      if (state.terminalKind === 'firstD') {
        state.gameOver = true;
        addLog('终局', '第一次大考 D，山门陷落，本局立即结束。', 'D 不进入第 9 月交接；试玩协议允许玩家自行决定是否另行重掷一次。');
        return;
      }
      state.step = 'end';
    }

    function renderEndStep() {
      const willExpire = Object.values(state.characters).filter(c => c.alive && c.life === 1);
      return `<section class="section" data-testid="end-step">
        <h2>${STEP_NAMES.end}</h2>
        <p>本步只扣减仍在世人物的当月寿元。${willExpire.length ? `${willExpire.map(c => c.name).join('、')}将扣至 0，并在下月寿命检测死亡。` : ''}</p>
        <div class="button-row"><button class="btn primary" type="button" onclick="confirmMonthEnd()" data-testid="confirm-end">确认月末结算${state.month === 18 ? '并生成终局总结' : ''}</button></div>
        <p class="cause">寿元扣减明确发生在大考检测之后；本按钮有步骤锁，不会重复扣减。</p>
      </section>`;
    }

    function confirmMonthEnd() {
      if (state.step !== 'end' || state.gameOver) return;
      const changes = [];
      Object.values(state.characters).forEach(c => {
        if (!c.alive || c.life === null) return;
        c.life = Math.max(0, c.life - 1);
        changes.push(`${c.name} ${c.life}`);
      });
      addLog(STEP_NAMES.end, `扣减寿元：${changes.length ? changes.join('；') : '本局未给寿尽月的人物不扣显示数值'}。`, '月末统一 -1；扣到 0 的人物在下月寿命检测才死亡。');
      if (state.month === 9 && !state.handover) {
        state.handover = generateHandover();
        addLog('第 9 月交接卡', '自动生成五栏盘点。', '每项只落一栏，并标出由哪月决定或大考结果造成。');
      }
      if (state.month === 18) {
        state.gameOver = true; state.terminalKind = 'month18';
        state.terminalReason = `第二次大考结果为 ${RESULT_NAMES[state.secondExam?.result] || '未记录'}；第 18 月月末寿元已扣减，十八个月闭环停止。`;
        addLog('终局', state.terminalReason, '本纸面实例不继续第三代。');
      } else {
        state.month += 1; state.step = 'life'; state.examDraft = { wager: 'estate', posture: 'balanced', roster: [], rosterInitialized: false }; state.actionError = ''; state.actionDraft = {}; state.soloYieldDraft = 0;
      }
      render();
    }

    function generateHandover() {
      const columns = { living: [], permanent: [], knowledge: [], unfinished: [], lost: [] };
      Object.values(state.characters).forEach(c => {
        if (c.alive) {
          const causes = [`第 1—${state.month} 月寿元与伤势结算`, `最近安排决定在第 ${c.lastDecisionMonth || 1} 月`];
          if (state.pillUse?.id === c.id) causes.push(`第 ${state.pillUse.month} 月延寿丹 +12`);
          if (c.id === 'guiyuan' && state.projects.breakthrough.success) causes.push(`第 ${state.projects.breakthrough.completeMonth} 月突破成功 +24`);
          columns.living.push({ text: `${c.name}：${lifeText(c)}，${injuryText(c)}${c.id === 'su' ? `，资格=${state.projects.qualification.qualified ? '合格' : '未合格'}，带队经历=${state.projects.guidance.status === 'complete' ? '已完成三个月' : '未形成完整事实'}` : ''}`, cause: causes.join('；') + '。' });
        }
      });
      if (state.projects.array.status === 'complete' || state.projects.array.status === 'damaged') columns.permanent.push({ text: `护山阵：${state.projects.array.status === 'damaged' ? '受损，本轮不可修' : '完整'}`, cause: `第 ${state.projects.array.completeMonth} 月由沈砺完成${state.projects.array.status === 'damaged' ? '；第 6 月 C 使其受损' : ''}。` });
      columns.permanent.push({ text: `库存庚金髓 ${state.resources.gengjin} 份`, cause: state.resourceEvents.map(e => `${e.month ? `第 ${e.month} 月${e.cause}` : e.cause}${e.delta > 0 ? '+' : ''}${e.delta}`).join('；') + '。' });
      if (state.externalAssets) columns.permanent.push({ text: '外部产业完整', cause: `第 6 月第一次大考结果 ${state.firstExam?.result || '未记录'}。` });
      if (state.rewardTiers) columns.permanent.push({ text: `大考战利品定性标签：第 1—${state.rewardTiers} 层`, cause: `第 6 月 ${state.firstExam.result}；具体数量与兑换规则未定义。` });
      if (state.projects.lootConversion.status === 'complete') columns.permanent.push({ text: '已转化专业战利品', cause: `沈砺第 ${state.projects.lootConversion.startMonth}—${state.projects.lootConversion.completeMonth} 月连续转化；不增减庚金髓数字。` });
      if (hasTideArtifact()) columns.permanent.push({ text: '镇潮法宝', cause: `沈砺第 ${state.projects.shenLegacy.startMonth}—${state.projects.shenLegacy.completeMonth} 月炼制；自动联动第二次大考问题 3 的法宝条件。` });
      if (hasEnhancedArray()) columns.permanent.push({ text: '强化护山阵', cause: `沈砺第 ${state.projects.shenLegacy.startMonth}—${state.projects.shenLegacy.completeMonth} 月强化；自动联动玄羽问题 2，旧赤潮不额外加成。` });
      if (state.projects.manual.status === 'complete') columns.knowledge.push({ text: '完整《归元剑典》', cause: `归元第 ${state.projects.manual.startMonth}—${state.projects.manual.completeMonth} 月整理；后人仍须学习。` });
      if (state.projects.routeMap.status === 'complete') columns.knowledge.push({ text: '完整沉锋谷引路图', cause: `岳徊第 ${state.projects.routeMap.startMonth}—${state.projects.routeMap.completeMonth} 月连续整理；地图不替代硬资格或个人熟练度。` });
      if (!state.projects.qualification.qualified && alive('su') && state.projects.qualification.attempts === 1 && state.projects.qualification.status === 'failed') columns.unfinished.push({ text: '苏砚硬资格二培', cause: `第一次培养在第 ${state.projects.qualification.completeMonth} 月失败；第 10 月起可再投 3 份、连续 3 月。` });
      if (!state.projects.qualification.qualified && alive('su') && state.projects.qualification.status === 'active') columns.unfinished.push({ text: `苏砚首次硬资格培养 ${state.projects.qualification.progress}/3`, cause: `第 ${state.projects.qualification.startMonth} 月首次开工并投入 3 份；苏砚仍在世，原安排自动续。` });
      if (state.projects.array.status === 'active' && alive('shen')) columns.unfinished.push({ text: `护山阵 ${state.projects.array.progress}/3`, cause: `第 ${state.projects.array.startMonth} 月开工；沈砺仍在世，原安排可续。` });
      if (state.projects.manual.status === 'active' && alive('guiyuan')) columns.unfinished.push({ text: `剑典整理 ${state.projects.manual.progress}/3`, cause: `第 ${state.projects.manual.startMonth} 月开始；归元仍在世，原安排可续。` });
      if (state.projects.breakthrough.status === 'active' && alive('guiyuan')) columns.unfinished.push({ text: `归元突破 ${state.projects.breakthrough.progress}/3（${tierName(state.projects.breakthrough.tier)}）`, cause: `第 ${state.projects.breakthrough.startMonth} 月开始；归元仍在世，原安排自动续。` });
      if (state.projects.guidance.status === 'active' && alive('yue') && alive('su')) columns.unfinished.push({ text: `岳徊带队／苏砚随行 ${state.projects.guidance.progress}/3`, cause: `第 ${state.projects.guidance.startMonth} 月开始；完成前不记录带队经历。` });
      if (state.projects.routeMap.status === 'active' && alive('yue')) columns.unfinished.push({ text: `沉锋谷引路图 ${state.projects.routeMap.progress}/3`, cause: `第 ${state.projects.routeMap.startMonth} 月开始；整理期间不采集。` });
      if (state.projects.lootConversion.status === 'active' && alive('shen')) columns.unfinished.push({ text: `专业战利品转化 ${state.projects.lootConversion.progress}/3`, cause: `第 ${state.projects.lootConversion.startMonth} 月开始；不改庚金髓数字。` });
      if (state.projects.shenLegacy.status === 'active' && alive('shen')) columns.unfinished.push({ text: `${state.projects.shenLegacy.kind === 'artifact' ? '镇潮法宝' : '护山阵强化'} ${state.projects.shenLegacy.progress}/3`, cause: `第 ${state.projects.shenLegacy.startMonth} 月开始；连续三月完成后才生成成果。` });
      if (!alive('yue') && state.projects.routeMap.status !== 'complete') columns.lost.push({ text: '岳徊个人沉锋谷路线经验', cause: `岳徊第 ${state.characters.yue.deathMonth} 月死亡；完整引路图未完成${state.projects.guidance.status === 'complete' ? '，苏砚的三个月带队经历仍作为其个人事实保留' : ''}。` });
      if (!alive('shen')) columns.lost.push({ text: '沈砺个人炼器熟练度与专业加工能力', cause: `沈砺第 ${state.characters.shen.deathMonth} 月死亡；死亡不产生传承。` });
      if (!alive('guiyuan')) columns.lost.push({ text: '归元个人战力与未外化理解', cause: `归元第 ${state.characters.guiyuan.deathMonth} 月死亡；${state.projects.manual.status === 'complete' ? '完整剑典已另列可携知识' : '未完成整理没有可执行补齐公式'}。` });
      if (!alive('lin')) columns.lost.push({ text: '林砚已学但未外化的个人内容', cause: `林砚第 ${state.characters.lin.deathMonth} 月死亡；功法文本若存在仍单列可携知识，但本轮不自动生成新人。` });
      if (!alive('su')) columns.lost.push({ text: '苏砚个人资格与秘境熟练度', cause: `苏砚第 ${state.characters.su.deathMonth} 月死亡；本轮不自动出现第二名稀有适配者。` });
      if (!state.externalAssets) columns.lost.push({ text: '全部外部产业', cause: '第 6 月第一次大考 C“山门独存”。' });
      if (state.projects.array.status === 'failed') columns.lost.push({ text: '未完成护山阵', cause: '沈砺死亡且无同等承接者／可执行图纸。' });
      return columns;
    }

    function renderHandover() {
      if (!state.handover) return '';
      const titles = { living: '在世人物', permanent: '永久成果', knowledge: '可携知识', unfinished: '可接续未竟事业', lost: '永久失去' };
      const grid = card => `<div class="handover-grid">${Object.entries(titles).map(([key, title]) => `<div class="handover-column"><h3>${title}</h3>${card[key].length ? `<ul>${card[key].map(item => `<li>${esc(item.text)}<div class="cause">${esc(item.cause)}</div></li>`).join('')}</ul>` : '<p class="subtle">本栏无项目。</p>'}</div>`).join('')}</div>`;
      const later = state.month > 9 ? `<h3>第 10 月后续盘｜当前事实</h3>${grid(generateHandover())}<p class="cause">后续盘读取带队经历、完整引路图、战利品转化与阵器成果；不倒改第 9 月历史卡。</p>` : '';
      return `<section class="section" data-testid="handover"><h2>第 9 月交接卡｜五栏事实盘点</h2>${grid(state.handover)}<p class="cause">交接不计算统一总分；人物死亡不自动转化为宗门底蕴。</p>${later}</section>`;
    }

    function renderTerminal() {
      const resultLine = state.terminalKind === 'firstD' ? '第 6 月山门陷落' : `十八个月完成，二考 ${RESULT_NAMES[state.secondExam?.result] || '未记录'}`;
      const alivePeople = Object.values(state.characters).filter(c => c.alive).map(c => `${c.name}（${lifeText(c)}，${injuryText(c)}）`).join('、') || '无';
      const route = routeStatus();
      const laterFacts = [
        `带队经历=${state.projects.guidance.status === 'complete' ? `有（第 ${state.projects.guidance.completeMonth} 月）` : '无'}`,
        `完整引路图=${state.projects.routeMap.status === 'complete' ? `有（第 ${state.projects.routeMap.completeMonth} 月）` : '无'}`,
        `专业战利品转化=${state.projects.lootConversion.status === 'complete' ? `完成（第 ${state.projects.lootConversion.completeMonth} 月）` : '未完成'}`,
        `镇潮法宝=${hasTideArtifact() ? '有' : '无'}`,
        `强化护山阵=${hasEnhancedArray() ? '有' : '无'}`
      ].join('；');
      return `<section class="terminal" data-testid="terminal">
        <p class="eyebrow">终局总结</p><h2>${esc(resultLine)}</h2>
        <p>${esc(state.terminalReason)}</p>
        ${state.terminalKind === 'firstD' ? '<div class="notice warn">试玩协议：第一次大考 D 允许重掷一次并记录原始结果。是否重掷由玩家自行决定，本模型不覆盖当前记录。</div>' : ''}
        <p><strong>终局在世：</strong>${esc(alivePeople)}</p>
        <p><strong>最终成果：</strong>庚金髓 ${state.resources.gengjin} 份；护山阵 ${esc(projectProgressText(state.projects.array, 3))}；剑典 ${esc(projectProgressText(state.projects.manual, 3))}；林砚研习 ${state.projects.learning.units}/12。</p>
        <p><strong>第二代事实：</strong>${esc(laterFacts)}。</p>
        <p><strong>沉锋谷通路：</strong>${esc(route.label)}。${esc(route.reason)}</p>
        <p><strong>第一次大考：</strong>${state.firstExam ? `${RESULT_NAMES[state.firstExam.result]}，${WAGER_NAMES[state.firstExam.wager]}×${POSTURE_NAMES[state.firstExam.posture]}` : '未发生'}。</p>
        <p><strong>第二次大考：</strong>${state.secondExam ? `${RESULT_NAMES[state.secondExam.result]}，${state.secondExam.branch === 'xuan' ? '玄羽兽潮' : '同强度赤潮'}，${WAGER_NAMES[state.secondExam.wager]}×${POSTURE_NAMES[state.secondExam.posture]}` : '未进入'}。</p>
        <h3>关键决定回顾</h3><ol class="decision-timeline">${state.decisions.map(d => `<li>第 ${d.month} 月：${esc(d.text.replace(/^第 \d+ 月/, ''))}</li>`).join('')}</ol>
        <p class="cause">终局只回顾可追溯事实，不给最优路线或推荐答案。</p>
      </section>`;
    }

    function renderReferenceTables() {
      const matrixRows = Object.keys(BASE_MATRIX).flatMap(image => Object.keys(BASE_MATRIX[image]).map(wager => `<tr><td>${IMAGE_NAMES[image]}</td><td>${WAGER_NAMES[wager]}</td>${BASE_MATRIX[image][wager].map(v => `<td class="num">${v}%</td>`).join('')}</tr>`)).join('');
      const injuryRows = Object.entries(INJURY_TABLE).flatMap(([posture, results]) => Object.entries(results).map(([result, probs]) => `<tr><td>${POSTURE_NAMES[posture]}</td><td>${result}</td>${probs.map(v => `<td class="num">${v}%</td>`).join('')}</tr>`)).join('');
      return `<section class="section"><details><summary>全部公开规则表：突破、资格、基础矩阵、姿态、伤势</summary>
        <h3>突破三档</h3><div class="table-wrap"><table><thead><tr><th>准备</th><th class="num">成功</th><th class="num">受伤</th><th class="num">重伤</th><th class="num">死亡</th></tr></thead><tbody>
          <tr><td>充分</td><td class="num">90%</td><td class="num">9%</td><td class="num">1%</td><td class="num">0%</td></tr>
          <tr><td>尚可</td><td class="num">70%</td><td class="num">26%</td><td class="num">3%</td><td class="num">1%</td></tr>
          <tr><td>勉强</td><td class="num">50%</td><td class="num">40%</td><td class="num">5%</td><td class="num">5%</td></tr>
        </tbody></table></div>
        <p>苏砚资格：成功 70%／受伤且失败 27%／重伤且失败 3%／死亡 0%。</p>
        <h3>D-42 伤势与心境数字</h3>
        <p>普通受伤：战斗／修炼／生产能力约 75%，休养 1 个月恢复。重伤：战斗能力约 40%，修炼与生产能力约 50%，不能突破或单独进入高风险秘境，休养 2 个月恢复。</p>
        <p>心境使用 1—5：1 低迷、2—4 平稳、5 澄明；连续修炼 3 个月 -1，连续高压生产 3 个月 -1，连续云游 3 个月 +2（上限 5），突破失败或重伤即时 -1，普通休养不自动提升；澄明使突破准备档 +1，低迷 -1。</p>
        <div class="undefined-rule">本局没有给五人的初始心境，也没有给本任务行动菜单中的“云游／高压生产”判定，因此 v1 只原样公开这些数字，不擅自初始化心境或改写玩家直接选择的突破档。</div>
        <h3>攻守兼备基础矩阵</h3><div class="table-wrap"><table><thead><tr><th>画像</th><th>押注</th><th class="num">A</th><th class="num">B</th><th class="num">C</th><th class="num">D</th></tr></thead><tbody>${matrixRows}</tbody></table></div>
        <h3>姿态转移</h3><ul>
          <li>全力进攻×守：最多 D→C 20。</li><li>全力进攻×保：最多 C→B 10；基础 D&gt;0 且剩余 C≥5，再 C→D 5。</li>
          <li>全力进攻×反：基础 A&gt;0 才整段执行；最多 15 先 C 后 B 转 A；基础 D&gt;0 再 C→D 5。基础 A=0 整段不执行。</li>
          <li>全力防守不能反攻；守最多 D→C 10；保先 D→C 10，再 B→C 15。</li>
        </ul>
        <h3>每名具名参战者伤势</h3><div class="table-wrap"><table><thead><tr><th>姿态</th><th>结果</th><th class="num">无伤</th><th class="num">受伤</th><th class="num">重伤</th><th class="num">死亡／失踪</th></tr></thead><tbody>${injuryRows}</tbody></table></div>
        <p>压倒性伤势：全攻 75/23/2/0，攻守兼备 90/9/1/0，全防沿用第一次全防 B 的 85/14/1/0。</p>
      </details></section>`;
    }

    function renderMain() {
      const active = state.gameOver ? renderTerminal() : `${renderStepRibbon()}${renderPublicPanel()}${state.step === 'life' ? renderLifeStep() : ''}${state.step === 'action' && !state.pendingRolls.length ? renderActionStep() : ''}${state.step === 'exam' && !state.pendingRolls.length ? renderExamStep() : ''}${state.pendingRolls.length ? renderPendingRoll() : ''}${state.step === 'end' ? renderEndStep() : ''}`;
      return `${active}${renderHandover()}${renderReferenceTables()}`;
    }

    function renderLogs() {
      const box = document.getElementById('log-box');
      if (!box) return;
      box.innerHTML = state.logs.length ? state.logs.map(entry => `<article class="log-entry"><time>第 ${entry.month} 月 · ${esc(entry.step)}</time><p>${esc(entry.text)}</p>${entry.reason ? `<div class="cause">${esc(entry.reason)}</div>` : ''}</article>`).join('') : '<div class="log-empty">尚无记录。</div>';
    }

    function render() {
      document.getElementById('header-month').textContent = state.gameOver ? '局面结束' : `第 ${state.month} 月`;
      document.getElementById('main-content').innerHTML = renderMain();
      renderLogs();
    }

    function renderAndRefocus(selector) {
      render();
      requestAnimationFrame(() => document.querySelector(selector)?.focus());
    }

    function exportText() {
      const lines = ['两代接力局面｜最小表格模型 v1.1', `导出时状态：第 ${state.month} 月${state.gameOver ? '，已终局' : `，${STEP_NAMES[state.step]}`}`, ''];
      state.logs.forEach(e => {
        lines.push(`【第 ${e.month} 月·${e.step}】${e.text}`);
        if (e.reason) lines.push(`原因：${e.reason}`);
      });
      lines.push('', '关键决定回顾');
      state.decisions.forEach(d => lines.push(`- 第 ${d.month} 月：${d.text}`));
      if (state.handover) {
        lines.push('', '第 9 月交接卡');
        const titles = { living: '在世人物', permanent: '永久成果', knowledge: '可携知识', unfinished: '可接续未竟事业', lost: '永久失去' };
        Object.entries(titles).forEach(([key, title]) => {
          lines.push(`[${title}]`);
          state.handover[key].forEach(item => lines.push(`- ${item.text}｜归因：${item.cause}`));
        });
        if (state.month > 9) {
          lines.push('', '第 10 月后续盘（当前事实）');
          const current = generateHandover();
          Object.entries(titles).forEach(([key, title]) => {
            lines.push(`[${title}]`);
            current[key].forEach(item => lines.push(`- ${item.text}｜归因：${item.cause}`));
          });
        }
      }
      const route = routeStatus();
      lines.push('', '第二代自动事实');
      lines.push(`- 苏砚三个月带队经历：${state.projects.guidance.status === 'complete' ? `是，第 ${state.projects.guidance.completeMonth} 月完成` : '否'}`);
      lines.push(`- 完整引路图：${state.projects.routeMap.status === 'complete' ? `是，第 ${state.projects.routeMap.completeMonth} 月完成` : '否'}`);
      lines.push(`- 已转化专业战利品：${state.projects.lootConversion.status === 'complete' ? `是，第 ${state.projects.lootConversion.completeMonth} 月完成` : '否'}`);
      lines.push(`- 镇潮法宝：${hasTideArtifact() ? `是，第 ${state.projects.shenLegacy.completeMonth} 月完成` : '否'}`);
      lines.push(`- 强化护山阵：${hasEnhancedArray() ? `是，第 ${state.projects.shenLegacy.completeMonth} 月完成` : '否'}`);
      lines.push(`- 通路状态：${route.label}｜原因：${route.reason}`);
      lines.push('', '规则未定义人工事实', JSON.stringify(state.manualFacts));
      return lines.join('\n');
    }

    function setExportStatus(text) { document.getElementById('export-status').textContent = text; }

    async function copyLog() {
      const text = exportText();
      try {
        await navigator.clipboard.writeText(text);
        setExportStatus('记录已复制到剪贴板。');
      } catch (_) {
        const area = document.createElement('textarea'); area.value = text; area.style.position = 'fixed'; area.style.opacity = '0';
        document.body.appendChild(area); area.select();
        const ok = document.execCommand('copy'); area.remove();
        setExportStatus(ok ? '记录已复制到剪贴板。' : '浏览器禁止剪贴板访问，请使用“下载 txt”。');
      }
    }

    function downloadLog() {
      const blob = new Blob([exportText()], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob); const link = document.createElement('a');
      link.href = url; link.download = `两代接力局面-第${state.month}月记录.txt`; document.body.appendChild(link); link.click(); link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 0); setExportStatus('txt 记录已生成。');
    }

    function resetGame() {
      if (!window.confirm('确认清空当前十八个月记录并重新开始？')) return;
      state = initialState(); initialize();
    }

    window.__round2Test = {
      getState: () => clone(state),
      setManualFact: (key, value) => { if (key in state.manualFacts) { state.manualFacts[key] = Boolean(value); render(); } },
      adjustedProbabilities: (image, wager, posture) => adjustedProbabilities(image, wager, posture),
      actionOptions: id => clone(actionOptions(id)),
      secondExamQuestions: () => clone(secondExamQuestions()),
      routeStatus: () => clone(routeStatus()),
      stableSupplyAssessment: () => clone(stableSupplyAssessment()),
      generateHandover: () => clone(generateHandover()),
      exportText
    };

    initialize();
  </script>
</body>
</html>
